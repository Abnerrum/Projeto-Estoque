{% extends "base.html" %}
{% block title %}Nova Movimentação{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4><i class="bi bi-arrow-left-right me-2"></i>Nova Movimentação</h4>
      <a href="{{ url_for('produtos.listar') }}" class="btn btn-outline-secondary btn-sm">Voltar</a>
    </div>
    <div class="card p-4">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Produto *</label>
          <select name="produto_id" class="form-select" required id="sel-produto">
            <option value="">Selecione...</option>
            {% for p in produtos %}
              <option value="{{ p.id }}"
                data-saldo="{{ p.saldo_atual }}"
                data-unidade="{{ p.unidade }}"
                {% if produto_id == p.id %}selected{% endif %}>
                {{ p.codigo }} — {{ p.nome }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div id="info-saldo" class="alert alert-info py-2 small mb-3" style="display:none">
          Saldo atual: <strong id="val-saldo">—</strong> <span id="val-unidade"></span>
        </div>

        <div class="mb-3">
          <label class="form-label">Tipo *</label>
          <div class="d-flex gap-3">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="tipo" id="tipo-entrada"
                     value="entrada" required checked>
              <label class="form-check-label text-success fw-semibold" for="tipo-entrada">
                <i class="bi bi-plus-circle me-1"></i>Entrada
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="tipo" id="tipo-saida" value="saida">
              <label class="form-check-label text-danger fw-semibold" for="tipo-saida">
                <i class="bi bi-dash-circle me-1"></i>Saída
              </label>
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Quantidade *</label>
          <input type="number" name="quantidade" class="form-control" min="1" required
                 placeholder="Ex: 10">
        </div>

        <div class="mb-4">
          <label class="form-label">Justificativa</label>
          <input type="text" name="justificativa" class="form-control"
                 placeholder="Ex: Compra NF 1234, Venda pedido #99...">
        </div>

        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-check-lg me-1"></i>Registrar movimentação
        </button>
      </form>
    </div>
  </div>
</div>

<script>
  const sel = document.getElementById('sel-produto');
  const info = document.getElementById('info-saldo');
  const valSaldo = document.getElementById('val-saldo');
  const valUnidade = document.getElementById('val-unidade');

  function atualizarInfo() {
    const opt = sel.options[sel.selectedIndex];
    if (opt && opt.value) {
      valSaldo.textContent = opt.dataset.saldo;
      valUnidade.textContent = opt.dataset.unidade;
      info.style.display = 'block';
    } else {
      info.style.display = 'none';
    }
  }

  sel.addEventListener('change', atualizarInfo);
  atualizarInfo();
</script>
{% endblock %}
