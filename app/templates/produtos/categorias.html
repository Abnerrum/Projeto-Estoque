{% extends "base.html" %}
{% block title %}Categorias{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4>Categorias</h4>
      <a href="{{ url_for('produtos.listar') }}" class="btn btn-outline-secondary btn-sm">Voltar</a>
    </div>
    <div class="card p-4 mb-3">
      <form method="POST" action="{{ url_for('produtos.nova_categoria') }}" class="d-flex gap-2">
        <input type="text" name="nome" class="form-control" placeholder="Nome da nova categoria" required>
        <button type="submit" class="btn btn-primary">Criar</button>
      </form>
    </div>
    <div class="card">
      <ul class="list-group list-group-flush">
        {% for cat in categorias %}
          <li class="list-group-item d-flex justify-content-between align-items-center">
            <span>{{ cat.nome }}</span>
            <span class="badge bg-secondary">{{ cat.produtos|length }} produto(s)</span>
          </li>
        {% else %}
          <li class="list-group-item text-muted text-center py-3">Nenhuma categoria ainda.</li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
{% endblock %}
